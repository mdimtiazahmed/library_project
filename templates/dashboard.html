<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Library System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f1a; color: white; }
        .sidebar {
            background: linear-gradient(180deg, #1a1a2e, #16213e);
            min-height: 100vh;
            width: 250px;
            position: fixed;
            padding: 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-brand {
            color: #e94560;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 10px 0 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(233,69,96,0.2);
            color: #e94560;
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .stat-number { font-size: 2rem; font-weight: 700; }
        .topbar {
            background: rgba(26,26,46,0.8);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-book-open me-2"></i>LibraryMS
    </div>
    <nav>
        <a href="/dashboard" class="nav-link active">
            <i class="fas fa-home me-2"></i>Dashboard
        </a>
        <a href="/books" class="nav-link">
            <i class="fas fa-book me-2"></i>Books
        </a>
        <a href="/members" class="nav-link">
            <i class="fas fa-users me-2"></i>Members
        </a>
        <a href="/transactions" class="nav-link">
            <i class="fas fa-exchange-alt me-2"></i>Transactions
        </a>
        <a href="/issue" class="nav-link">
            <i class="fas fa-hand-holding-heart me-2"></i>Issue Book
        </a>
        <hr style="border-color: rgba(255,255,255,0.1)">
        <a href="/logout" class="nav-link text-danger">
            <i class="fas fa-sign-out-alt me-2"></i>Logout
        </a>
    </nav>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="topbar">
        <h4 class="mb-0">Dashboard</h4>
        <span class="text-white-50">
            <i class="fas fa-user me-2"></i>Welcome, {{ session['username'] }}!
        </span>
    </div>

    <!-- Stats -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-white-50 mb-1">Total Books</p>
                        <h2 class="stat-number text-primary">{{ total_books }}</h2>
                    </div>
                    <div class="stat-icon" style="background: rgba(13,110,253,0.2)">
                        <i class="fas fa-book text-primary"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-white-50 mb-1">Total Members</p>
                        <h2 class="stat-number text-success">{{ total_members }}</h2>
                    </div>
                    <div class="stat-icon" style="background: rgba(25,135,84,0.2)">
                        <i class="fas fa-users text-success"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-white-50 mb-1">Issued Books</p>
                        <h2 class="stat-number text-warning">{{ issued_books }}</h2>
                    </div>
                    <div class="stat-icon" style="background: rgba(255,193,7,0.2)">
                        <i class="fas fa-exchange-alt text-warning"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-white-50 mb-1">Overdue Books</p>
                        <h2
